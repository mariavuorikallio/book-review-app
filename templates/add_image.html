{% extends "layout.html" %}

{% block title %}Lisää profiilikuva{% endblock %}

{% block content %}

<h2>Lisää profiilikuva</h2>

<form action="/add_image" method="post" enctype="multipart/form-data">

  <p>
    Kuva (vain .jpg/.jpeg, max 1 Mt):
    <input type="file" name="image" accept=".jpg,.jpeg" required>
  </p>

  <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">

  <input type="submit" value="Lähetä">
</form>

{% if session.user_id %}
  <p>
    <a href="/user/{{ session.user_id }}">Takaisin profiiliin</a>
  </p>
{% else %}
  <p>
    <a href="/">Takaisin etusivulle</a>
  </p>
{% endif %}

{% endblock %}
