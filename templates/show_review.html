<!DOCTYPE html>
<html>

<head>
  <title>{{ review.title }}</title>
</head>

<body>
  <h1>{{ review.title }}</h1>
  {% if session.user_id == review.user_id %}
  <p>
    <a href="/edit_review/{{ review.id }}">Muokkaa</a>
    <a href="/remove_review/{{ review.id }}">Poista</a>
  </p>
  {% endif %}
  <p>
   {{ review.author }}
  </p>
  <p>
   Kuvaus: {{ review.description }}
  </p>
  <p>
   Käyttäjä: {{ review.username }}
  </p>
  <p>
   <a href="/">Takaisin</a>
  </p>
</body>

</html>
