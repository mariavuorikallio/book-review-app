<!DOCTYPE html>
<html>

<head>
  <title>Uusi arvostelu</title>
</head>

<body>
  <h1>Uusi arvostelu</h1>
  <form action="/create_review" method="post">
    <p>
      Kirjan nimi: <br />
      <input type="text" name="title" maxlength="50" required />
    </p>
    <p>
      Kirjailija: <br />
      <input type="text" name="author" maxlength="50" required />
    </p>
    <p>
      Kuvaus: <br />
      <textarea name="description" rows="8" cols="60" maxlength="1000" required></textarea>
    </p>

    {% for class in classes %}
    <p>
      {{ class }}: <br />
      <select name="classes">
      {% for option in classes[class] %}
        <option value="{{ class }}:{{ option }}">{{ option }}</option>
      {% endfor %}
      </select>
    </p>
    {% endfor %}

    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />

    <input type="submit" value="Luo arvostelu" />
  </form>
</body>

</html>
