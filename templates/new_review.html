{% extends "layout.html" %}

{% block title %}Uusi arvostelu{% endblock %}

{% block content %}

<h2>Uusi arvostelu</h2>

<form action="/create_review" method="post">

  <p>
    Kirjan nimi:<br>
    <input type="text" name="title" maxlength="50" required>
  </p>

  <p>
    Kirjailija:<br>
    <input type="text" name="author" maxlength="50" required>
  </p>

  <p>
    Kuvaus:<br>
    <textarea name="description" rows="6" maxlength="1000" required></textarea>
  </p>

  {% for class in classes %}
    <p>
      {{ class }}:<br>
      <select name="classes">
        {% for option in classes[class] %}
          <option value="{{ class }}:{{ option }}">{{ option }}</option>
        {% endfor %}
      </select>
    </p>
  {% endfor %}

  <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">

  <button type="submit">Luo arvostelu</button>
  <a href="/">Peruuta</a>

</form>

{% endblock %}
