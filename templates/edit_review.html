{% extends "layout.html" %}

{% block title %}Muokkaa arvostelua{% endblock %}

{% block content %}

<h2>Muokkaa arvostelua</h2>

<form action="/update_review" method="post">

  <p>
    Kirjan nimi:<br>
    <input type="text" name="title" value="{{ review.title }}" maxlength="50" required>
  </p>

  <p>
    Kirjailija:<br>
    <input type="text" name="author" value="{{ review.author }}" maxlength="50" required>
  </p>

  <p>
    Kuvaus:<br>
    <textarea name="description" rows="6" maxlength="1000" required>{{ review.description }}</textarea>
  </p>

  {% for class in all_classes %}
    <p>
      {{ class }}:<br>
      <select name="classes">
        {% for option in all_classes[class] %}
          <option value="{{ class }}:{{ option }}"
            {% if classes[class] == option %}selected{% endif %}>
            {{ option }}
          </option>
        {% endfor %}
      </select>
    </p>
  {% endfor %}

  <input type="hidden" name="review_id" value="{{ review.id }}">
  <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">

  <button type="submit"> Tallenna muutokset</button>
  <a href="/review/{{ review.id }}">Peruuta</a>

</form>

{% endblock %}
